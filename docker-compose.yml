services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  keycloak:
    image: quay.io/keycloak/keycloak
    container_name: keycloak
    ports:
      - "8080:8080"
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=temp
      - KC_BOOTSTRAP_ADMIN_PASSWORD=temp
    command: start-dev
    volumes:
      - keycloak-data:/opt/keycloak/data

  hecla-backend:
    build: hecla-backend/
    container_name: hecla-backend
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
      - keycloak
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/hecladb

  hecla-frontend:
    build: hecla-frontend/
    container_name: hecla-frontend
    ports:
      - "3000:3000"

volumes:
  mongo-data:
  keycloak-data: # make separate db for kc credentials?